<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header>
    <h1>Atendimento</h1>
</header>

<div class="container">
    <a href="/" class="voltar">← Voltar ao Menu</a>

    <form id="formAtendimento">
        <input type="text" id="acolhido" placeholder="Acolhido" required>
        <input type="text" id="descricao" placeholder="Descrição" required>
        <input type="date" id="data" required>
        <button type="submit">Salvar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>Acolhido</th>
                <th>Descrição</th>
                <th>Data</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody id="listaAtendimento"></tbody>
    </table>
</div>

<script src="/js/atendimento.js"></script>
</body>
</html>
