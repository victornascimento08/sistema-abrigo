<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acolhidos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background: #ff9800;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #ff9800;
            color: white;
        }
    </style>
</head>
<body>

<header>
    <h1>Gestão de Acolhidos</h1>
</header>

<div class="container">
    <table>
        <tr>
            <th>Nome</th>
            <th>Idade</th>
            <th>Quarto</th>
        </tr>
        <tr>
            <td>Maria</td>
            <td>12</td>
            <td>1</td>
        </tr>
    </table>
</div>

</body>
</html>
