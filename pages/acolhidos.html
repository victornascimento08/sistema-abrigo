<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">

  <title>Acolhidos</title>

  <link
    rel="stylesheet"
    href="../style.css"
  >

</head>

<body>

  <div class="box">

    <h1>
      Cadastro de Acolhidos
    </h1>

    <form id="form-acolhidos">

      <input
        type="text"
        id="nome"
        placeholder="Nome"
      >

      <input
        type="number"
        id="idade"
        placeholder="Idade"
      >

      <button type="submit">
        Cadastrar
      </button>

    </form>

  </div>

  <script src="../script.js"></script>

</body>

</html>
